function BettyApp() {
  const [lang, setLang] = React.useState(()=>{try{return localStorage.getItem('betty_lang')||"en"}catch{return"en"}});
  const [screen, setScreen] = React.useState("onboarding");

  const [saveTags, setSaveTags] = React.useState("");
  const [savePhoto, setSavePhoto] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [editRec, setEditRec] = React.useState(null);
  const [editTitle, setEditTitle] = React.useState("");
  const [editTime, setEditTime] = React.useState("");
  const [editTags, setEditTags] = React.useState("");
  const [editSteps, setEditSteps] = React.useState("");
  const [editIng, setEditIng] = React.useState("");
  const [editPhoto, setEditPhoto] = React.useState(null);
  const [fridgeItems, setFridgeItems] = React.useState("");
  const [fridgeResult, setFridgeResult] = React.useState(null);
  const [fridgeLoading, setFridgeLoading] = React.useState(false);
  const [fridgePhoto, setFridgePhoto] = React.useState(null);
  const [photoAnalyzing, setPhotoAnalyzing] = React.useState(false);
  const [previewRec, setPreviewRec] = React.useState(null);
  const [selRec, setSelRec] = React.useState(null);
  const [cookMode, setCookMode] = React.useState(false);
  const [cookStep, setCookStep] = React.useState(0);
  const [chatMsg, setChatMsg] = React.useState("");
  const [chatHistory, setChatHistory] = React.useState([]);
  const [chatLoading, setChatLoading] = React.useState(false);
  const [shopping, setShopping] = React.useState(()=>{try{return JSON.parse(localStorage.getItem('betty_shopping')||'[]')}catch{return[]}});
  const [checked, setChecked] = React.useState({});
  const [starred, setStarred] = React.useState(()=>{try{return JSON.parse(localStorage.getItem('betty_starred')||'[]')}catch{return[]}});
  const [showShopping, setShowShopping] = React.useState(false);
  const [showSettings, setShowSettings] = React.useState(false);
  const [showReport, setShowReport] = React.useState(false);
  const [infoModal, setInfoModal] = React.useState(null);
  const [showNameEdit, setShowNameEdit] = React.useState(false);
  const [newDispName, setNewDispName] = React.useState("");
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [agreedToPrivacy, setAgreedToPrivacy] = React.useState(false);
  const [showPolicyOverlay, setShowPolicyOverlay] = React.useState(false);
  const [showPrivacyPrompt, setShowPrivacyPrompt] = React.useState(false);
  const [confirmDeleteAccount, setConfirmDeleteAccount] = React.useState(false);
  const [shopInput, setShopInput] = React.useState("");
  const [reportTopic, setReportTopic] = React.useState("");
  const [reportDesc, setReportDesc] = React.useState("");
  const [reportSent, setReportSent] = React.useState(false);
  const [showPlan, setShowPlan] = React.useState(false);
  const [showVictory, setShowVictory] = React.useState(false);
  const [victoryTitle, setVictoryTitle] = React.useState("");
  const [cookHistory, setCookHistory] = React.useState(()=>{try{return JSON.parse(localStorage.getItem('betty_history')||'[]')}catch{return[]}});
  const chatEndRef = React.useRef(null);
  const chatInputRef = React.useRef(null);
  const L = T[lang]||T.en;

  React.useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user){
        setUser(session.user);
        const n=session.user.user_metadata?.display_name||session.user.email?.split('@')[0]||"";
        setDispName(n);
        const sl=localStorage.getItem('betty_lang')||'en';
        setLang(sl);
        setDietary(JSON.parse(localStorage.getItem('betty_dietary')||'[]'));
        setScreen("main");
        if(!localStorage.getItem('betty_privacy_agreed'))setShowPrivacyPrompt(true);
      }
      setAuthChecked(true);
    });
    supabase.auth.onAuthStateChange((_e,session)=>{if(session?.user)setUser(session.user); else setUser(null);});
  },[]);

  React.useEffect(()=>{setBettyMsg(getRandom(L.greetings));},[lang]);
  React.useEffect(()=>{if(chatEndRef.current)chatEndRef.current.scrollIntoView({behavior:"smooth"});},[chatHistory]);
  React.useEffect(()=>{if(user&&screen==="main")loadRecipes();},[user,screen]);
  React.useEffect(()=>{try{localStorage.setItem('betty_shopping',JSON.stringify(shopping))}catch{}},[shopping]);
  React.useEffect(()=>{try{localStorage.setItem('betty_starred',JSON.stringify(starred))}catch{}},[starred]);

  React.useEffect(()=>{
    if(!showVictory)return;
    let frame;
    try{
      const c=document.getElementById('confetti-container');
      if(!c)return;
      const colors=['#fa9f9d','#c4cdf0','#BFE8DC','#f9f6c1','#8f9fe0'];
      const pieces=[];
      for(let i=0;i<60;i++){
        const p=document.createElement('div');
        const sz=6+Math.random()*8;
        p.style.cssText='position:absolute;width:'+sz+'px;height:'+sz+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';left:'+(Math.random()*100)+'%;top:-20px;border-radius:'+(Math.random()>.5?'50%':'2px')+';opacity:0.9';
        c.appendChild(p);
        pieces.push({el:p,x:parseFloat(p.style.left),y:-20,vx:(Math.random()-.5)*2,vy:2+Math.random()*3,rot:0,vrot:(Math.random()-.5)*6});
      }
      const animate=()=>{
        pieces.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.rot+=p.vrot;p.vy+=.05;p.el.style.top=p.y+'px';p.el.style.left=p.x+'%';p.el.style.transform='rotate('+p.rot+'deg)';});
        frame=requestAnimationFrame(animate);
      };
      animate();
    }catch(e){}
    return()=>{cancelAnimationFrame(frame);const c=document.getElementById('confetti-container');if(c)c.innerHTML='';};
  },[showVictory]);

  const loadRecipes = async()=>{
    if(!user)return;
    setRecipesLoading(true);
    try{
      const s=await supabase.auth.getSession();
      const t=s.data.session?.access_token||SUPA_KEY;
      const res=await sbFetch(`recipes?user_id=eq.${user.id}&order=created_at.desc`,{token:t});
      const data=await res.json();
      if(Array.isArray(data)){
        setRecipes(data.map(r=>{
          let tags=[],steps=[],ingredients=[];
          try{tags=JSON.parse(r.tags||'[]');}catch{tags=[];}
          try{steps=JSON.parse(r.steps||'[]');}catch{steps=[];}
          try{ingredients=JSON.parse(r.ingredients||'[]');}catch{ingredients=[];}
          return{...r,tags,steps,ingredients,calories:r.calories||null,pinned:r.pinned||false,favorited:r.favorited||false};
        }));
      }
    }catch{}
    setRecipesLoading(false);
  };

  const saveRecipeToDB=async(r)=>{
    if(!user)return Promise.resolve();
    try{const s=await supabase.auth.getSession();const t=s.data.session?.access_token||SUPA_KEY;const res=await sbFetch("recipes",{method:"POST",token:t,body:JSON.stringify({title:r.title,time:r.time,tags:JSON.stringify(r.tags),img:r.img,betty:r.betty,steps:JSON.stringify(r.steps),ingredients:JSON.stringify(r.ingredients),photo:r.photo||null,calories:r.calories||null,user_id:user.id,pinned:r.pinned||false,favorited:r.favorited||false})});const[saved]=await res.json();return saved||null;}catch{return null;}
  };

  const updateRecipeToDB=async(r)=>{
    if(!user)return;
    try{const s=await supabase.auth.getSession();const t=s.data.session?.access_token||SUPA_KEY;await sbFetch(`recipes?id=eq.${r.id}&user_id=eq.${user.id}`,{method:"PATCH",prefer:"return=minimal",token:t,body:JSON.stringify({title:r.title,time:r.time,tags:JSON.stringify(r.tags),img:r.img,betty:r.betty,steps:JSON.stringify(r.steps),ingredients:JSON.stringify(r.ingredients),photo:r.photo||null,calories:r.calories||null,pinned:r.pinned||false,favorited:r.favorited||false})});}catch{}
  };

  const deleteRecipeToDB=async(id)=>{
    if(!user)return;
    try{const s=await supabase.auth.getSession();const t=s.data.session?.access_token||SUPA_KEY;await sbFetch(`recipes?id=eq.${id}&user_id=eq.${user.id}`,{method:"DELETE",prefer:"return=minimal",token:t});}catch{}
  };

  const patchRecipeToDB=async(id,fields)=>{
    if(!user)return;
    try{const s=await supabase.auth.getSession();const t=s.data.session?.access_token||SUPA_KEY;await sbFetch(`recipes?id=eq.${id}&user_id=eq.${user.id}`,{method:"PATCH",prefer:"return=minimal",token:t,body:JSON.stringify(fields)});}catch{}
  };

  const SYSTEM="You are Betty, a witty, warm, slightly sassy AI cooking assistant. Always respond in " + L.bettyLang + " unless the user writes in a different language. Be short, punchy, funny." + (dietary.length?" Dietary preferences: "+dietary.join(", ")+".":"") + (dispName?" User's name is "+dispName+".":"") + (cookHistory.length?" Recently cooked: "+cookHistory.slice(0,5).map(h=>h.title).join(", ")+". Suggest variety.":"");

  const callBetty=async(body)=>{
    const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    return res.json();
  };

  const sortedRecipes=React.useMemo(()=>[...recipes].sort((a,b)=>{
    if(a.pinned&&!b.pinned)return-1;if(!a.pinned&&b.pinned)return 1;
    if(a.favorited&&!b.favorited)return-1;if(!a.favorited&&b.favorited)return 1;
    return 0;
  }),[recipes]);

  const filteredRecipes=sortedRecipes.filter(r=>{
    const ms=!searchQuery||r.title.toLowerCase().includes(searchQuery.toLowerCase())||r.tags.some(t=>t.toLowerCase().includes(searchQuery.toLowerCase()));
    const mt=!activeFilter||(activeFilter==="__favorites__"?r.favorited:activeFilter==="__pinned__"?r.pinned:r.tags.includes(activeFilter));
    return ms&&mt;
  });

  const allTags=[...new Set(recipes.flatMap(r=>r.tags))];

  const handlePhotoUpload=(e,setter)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();reader.onload=ev=>setter(ev.target.result);reader.readAsDataURL(file);
  };

  const handleAuth=async()=>{
    setAuthLoading(true);setAuthError("");
    try{
      if(authMode==="signup"){
        const{data,error}=await supabase.auth.signUp({email,password,options:{data:{display_name:dispName}}});
        if(error){setAuthError(error.message);setAuthLoading(false);return;}
        if(data.user){setUser(data.user);setObStep(2);}
      } else {
        const{data,error}=await supabase.auth.signInWithPassword({email,password});
        if(error){setAuthError(error.message);setAuthLoading(false);return;}
        if(data.user){
          setUser(data.user);
          const n=data.user.user_metadata?.display_name||data.user.email?.split('@')[0]||"";
          setDispName(n);
          try{localStorage.setItem('betty_lang',lang);localStorage.setItem('betty_dietary',JSON.stringify(dietary));localStorage.setItem('betty_privacy_agreed','1');}catch{}
          setBettyMsg(L.welcome(n));setScreen("main");
        }
      }
    }catch{setAuthError(L.authError);}
    setAuthLoading(false);
  };

  const handleMagicLink=async()=>{
    if(!email)return;
    setAuthLoading(true);setAuthError("");
    try{
      const{error}=await supabase.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin}});
      if(error)setAuthError(error.message);else setMagicSent(true);
    }catch{setAuthError(L.authError);}
    setAuthLoading(false);
  };

  const handleSignOut=async()=>{
    await supabase.auth.signOut();setUser(null);setRecipes([]);setShowSettings(false);
    setScreen("onboarding");setObStep(0);setEmail("");setPassword("");setDispName("");
  };

  const handleDeleteAccount=async()=>{
    try{
      const s=await supabase.auth.getSession();
      const token=s.data.session?.access_token;
      await fetch("/api/delete-account",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token,userId:user.id})});
    }catch(e){console.error(e);}
    try{localStorage.removeItem('betty_privacy_agreed');}catch{}
    await supabase.auth.signOut();
    setUser(null);setRecipes([]);setShowSettings(false);setConfirmDeleteAccount(false);
    setScreen("onboarding");setObStep(0);setEmail("");setPassword("");setDispName("");
  };

  const handleSave=async()=>{
    if(!saveTitle.trim()&&!saveIng.trim()&&!saveSteps.trim())return;
    setSaving(true);
    const fb={id:Date.now(),title:saveTitle.trim()||"My Recipe",time:saveTime.trim()||"? min",tags:saveTags?saveTags.split(",").map(t=>t.trim()).filter(Boolean):["saved"],img:"🍽️",photo:savePhoto||null,betty:"Saved!",steps:saveSteps.split("\n").map(s=>s.trim()).filter(Boolean),ingredients:saveIng.split("\n").map(i=>i.trim()).filter(Boolean),calories:null,pinned:false,favorited:false};
    try{
      const data=await callBetty({model:"claude-sonnet-4-6",max_tokens:2000,system:`You are Betty. Structure this recipe, keep the SAME LANGUAGE as input. Return ONLY valid JSON: {"title":"Name","time":"X min","tags":["tag"],"betty":"funny one-liner","steps":["step1"],"ingredients":["item"],"calories":"~XXX kcal"}`,messages:[{role:"user",content:`Title: ${saveTitle}\nTime: ${saveTime}\nIngredients:\n${saveIng}\n\nSteps:\n${saveSteps}`}]});
      const clean=data.content?.map(c=>c.text||"").join("").trim().replace(/```json|```/g,"").trim();
      let p=null;try{p=JSON.parse(clean);}catch{}
      const nr={id:Date.now(),title:p?.title||fb.title,time:p?.time||fb.time,tags:p?.tags||fb.tags,img:"🍽️",photo:savePhoto||null,betty:p?.betty||fb.betty,steps:p?.steps?.length?p.steps:fb.steps,ingredients:p?.ingredients?.length?p.ingredients:fb.ingredients,calories:p?.calories||null,pinned:false,favorited:false};
      const saved=await saveRecipeToDB(nr);
      if(saved){await loadRecipes();setBettyMsg(getRandom(L.saving));setSaveTitle("");setSaveIng("");setSaveSteps("");setSaveTime("");setSaveTags("");setSavePhoto(null);setShowSaveForm(false);}
      else{setBettyMsg(L.glitch);}
    }catch{
      const saved=await saveRecipeToDB(fb);
      if(saved){await loadRecipes();setBettyMsg(L.savingFallback);setSaveTitle("");setSaveIng("");setSaveSteps("");setSaveTime("");setSaveTags("");setSavePhoto(null);setShowSaveForm(false);}
      else{setBettyMsg(L.glitch);}
    }
    setSaving(false);
  };

  const handleLink=async()=>{
    if(!linkUrl.trim())return;
    setLinkLoading(true);
    try{
      const data=await callBetty({scrape_url:linkUrl});
      const raw=data.content?.map(c=>c.text||"").join("").trim();
      const jsonMatch=raw?.match(/\{[\s\S]*\}/);
      let p=null;try{p=jsonMatch?JSON.parse(jsonMatch[0]):null;}catch{}
      if(p?.title){
        const nr={id:Date.now(),title:p.title,time:p.time||"? min",tags:p.tags||["saved"],img:"🍽️",photo:null,betty:p.betty||"Saved from a link!",steps:p.steps||[],ingredients:p.ingredients||[],calories:p.calories||null,pinned:false,favorited:false};
        const saved=await saveRecipeToDB(nr);if(saved){await loadRecipes();setBettyMsg(L.saved(p.title));setLinkUrl("");setShowLinkForm(false);}else{setBettyMsg(L.glitch);}
      }else{setBettyMsg(L.glitch);}
    }catch{setBettyMsg(L.glitch);}
    setLinkLoading(false);
  };

  const openEdit=r=>{setEditRec(r);setEditTitle(r.title);setEditTime(r.time);setEditTags(r.tags.join(", "));setEditSteps(r.steps.join("\n"));setEditIng(r.ingredients.join("\n"));setEditPhoto(r.photo||null);};

  const handleEditSave=async()=>{
    const u={...editRec,title:editTitle.trim()||editRec.title,time:editTime.trim()||editRec.time,tags:editTags.split(",").map(t=>t.trim()).filter(Boolean),steps:editSteps.split("\n").map(s=>s.trim()).filter(Boolean),ingredients:editIng.split("\n").map(i=>i.trim()).filter(Boolean),photo:editPhoto};
    setRecipes(prev=>prev.map(r=>r.id===u.id?u:r));await updateRecipeToDB(u);setEditRec(null);setBettyMsg(L.updated);
  };

  const handleDelete=async id=>{setRecipes(prev=>prev.filter(r=>r.id!==id));await deleteRecipeToDB(id);setEditRec(null);setBettyMsg(L.deleted);};

  const togglePin=async r=>{const u={...r,pinned:!r.pinned};setRecipes(prev=>prev.map(x=>x.id===u.id?u:x));await patchRecipeToDB(r.id,{pinned:u.pinned});};
  const toggleFav=async r=>{const u={...r,favorited:!r.favorited};setRecipes(prev=>prev.map(x=>x.id===u.id?u:x));await patchRecipeToDB(r.id,{favorited:u.favorited});};

    await supabase.auth.resetPasswordForEmail(user?.email);

    reader.onload = async(ev) => {
      const base64Data = ev.target.result.split(',')[1];
      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 500,
            messages: [{
              role: "user",
              content: [
                {type: "image", source: {type: "base64", media_type: file.type, data: base64Data}},
                {type: "text", text: "Look at this fridge/pantry photo. List the main ingredients you can see, separated by commas. Be concise. Respond in " + (lang === "bg" ? "Bulgarian" : "English") + "."}
              ]
            }]
          })
        });
        const data = await res.json();
        const ingredients = data.content?.map(c=>c.text||"").join("").trim();

                  </>
                  <div style={{display:"flex",gap:8,background:"#fff",borderRadius:18,padding:"14px 16px",border:`1.5px solid ${C.border}`,boxShadow:"0 4px 14px rgba(180,220,200,0.2)"}}>
                    <textarea ref={chatInputRef} value={chatMsg} rows={1} onChange={e=>{setChatMsg(e.target.value);e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";}} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleChat();}}} placeholder="" style={{flex:1,border:"none",outline:"none",fontSize:14,background:"transparent",color:C.text,resize:"none",overflow:"hidden",lineHeight:"1.4",fontFamily:"Georgia,serif",padding:0,minHeight:22,maxHeight:120}}/>
                    <Btn onClick={handleChat} disabled={chatLoading} style={{padding:"8px 14px",fontSize:16,borderRadius:12}}>↑</Btn>
                  </div>
                </div>
              )}
            </div>
          )}

        </div>

        {/* DELETE ACCOUNT CONFIRM */}
        {confirmDeleteAccount&&(
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,height:"100vh",background:"rgba(45,74,66,0.5)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setConfirmDeleteAccount(false)}>
            <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:32,textAlign:"center",marginBottom:12}}>⚠️</div>
              <div style={{fontWeight:"bold",fontSize:18,color:C.text,marginBottom:10,textAlign:"center"}}>{lang==="bg"?"Изтрий акаунта":"Delete account"}</div>
              <div style={{fontSize:14,color:C.textMuted,marginBottom:24,lineHeight:1.6,textAlign:"center"}}>{lang==="bg"?"Това ще изтрие всичките ти рецепти и данни завинаги. Действието не може да се върне.":"This will permanently delete all your recipes and data. This action cannot be undone."}</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setConfirmDeleteAccount(false)} style={{flex:1,padding:"13px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:14,color:C.textMuted,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif"}}>{lang==="bg"?"Отказ":"Cancel"}</button>
                <button onClick={handleDeleteAccount} style={{flex:1,padding:"13px",background:"#fa9f9d",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>{lang==="bg"?"Изтрий":"Delete"}</button>
              </div>
            </div>
          </div>
        )}

        {/* PRIVACY PROMPT — existing users */}
        {showPrivacyPrompt&&(
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,height:"100vh",background:"rgba(45,74,66,0.7)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
            <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.2)"}}>
              <div style={{fontWeight:"bold",fontSize:18,color:C.text,marginBottom:6}}>🔒 Privacy Policy</div>
              <div style={{fontSize:12,color:C.textMuted,marginBottom:12}}>Effective Date: 17 April 2026</div>
              <div style={{fontSize:13,color:C.textMuted,lineHeight:1.7,whiteSpace:"pre-line",flex:1,overflowY:"auto",marginBottom:16}}>{PRIVACY_POLICY}</div>
              <button onClick={()=>{try{localStorage.setItem('betty_privacy_agreed','1');}catch{}setShowPrivacyPrompt(false);}} style={{width:"100%",padding:"14px",background:"#fa9f9d",border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>
                {lang==="bg"?"Прочетох и се съгласявам":"I have read and agree"}
              </button>
            </div>
          </div>
        )}

        {/* INFO MODAL */}
        {infoModal&&(
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,height:"100vh",background:"rgba(45,74,66,0.5)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setInfoModal(null)}>
            <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",maxHeight:"80vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexShrink:0}}>
                <div style={{fontWeight:"bold",fontSize:18,color:C.text}}>{infoModal.title}</div>
                <button onClick={()=>setInfoModal(null)} style={{background:C.bg,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:C.textMuted,fontSize:16}}>×</button>
              </div>
              <div style={{fontSize:13,color:C.textMuted,lineHeight:1.7,whiteSpace:"pre-line",marginBottom:16,overflowY:infoModal.scrollable?"auto":"visible",flex:infoModal.scrollable?"1":"none"}}>{infoModal.body}</div>
              {infoModal.btnLabel&&<button onClick={infoModal.btnAction} style={{width:"100%",padding:"13px",background:"#fa9f9d",border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif",marginBottom:10,flexShrink:0}}>{infoModal.btnLabel}</button>}
              <button onClick={()=>setInfoModal(null)} style={{width:"100%",padding:"13px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:14,color:C.textMuted,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif",flexShrink:0}}>{lang==="bg"?"Затвори":"Close"}</button>
            </div>
          </div>
        )}

        {/* NAME EDIT MODAL */}
        {showNameEdit&&(
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,height:"100vh",background:"rgba(45,74,66,0.5)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setShowNameEdit(false)}>
            <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div style={{fontWeight:"bold",fontSize:18,color:C.text}}>{lang==="bg"?"Промени името":"Edit display name"}</div>
                <button onClick={()=>setShowNameEdit(false)} style={{background:C.bg,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:C.textMuted,fontSize:16}}>×</button>
              </div>
              <input value={newDispName} onChange={e=>setNewDispName(e.target.value)} style={{width:"100%",padding:"12px 14px",borderRadius:12,border:`1.5px solid ${C.border}`,fontSize:14,background:"#F0F7F4",outline:"none",color:C.text,fontFamily:"Georgia,serif",boxSizing:"border-box",marginBottom:16}}/>
              <button onClick={()=>{if(newDispName.trim()){setDispName(newDispName.trim());supabase.auth.updateUser({data:{display_name:newDispName.trim()}});}setShowNameEdit(false);}} style={{width:"100%",padding:"13px",background:"#fa9f9d",border:"none",borderRadius:14,color:"#fff",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>{lang==="bg"?"Запази":"Save"}</button>
            </div>
          </div>
        )}

        {/* DELETE CONFIRM MODAL */}
        {confirmDelete&&(
          <div style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,height:"100vh",background:"rgba(45,74,66,0.5)",zIndex:210,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setConfirmDelete(null)}>
            <div style={{background:"#fff",borderRadius:24,padding:28,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
              <div style={{fontWeight:"bold",fontSize:18,color:C.text,marginBottom:10}}>{lang==="bg"?"Изтрий рецептата":"Delete recipe"}</div>
              <div style={{fontSize:14,color:C.textMuted,marginBottom:24}}>{lang==="bg"?"Сигурен ли си? Това не може да се върне.":"Are you sure? This cannot be undone."}</div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setConfirmDelete(null)} style={{flex:1,padding:"13px",background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:14,color:C.textMuted,fontSize:14,cursor:"pointer",fontFamily:"Georgia,serif"}}>{lang==="bg"?"Отказ":"Cancel"}</button>
                <button onClick={()=>{handleDelete(confirmDelete);setConfirmDelete(null);setEditRec(null);}} style={{flex:1,padding:"13px",background:"#fa9f9d",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:"bold",cursor:"pointer",fontFamily:"Georgia,serif"}}>{lang==="bg"?"Изтрий":"Delete"}</button>
              </div>
            </div>
          </div>
        )}

        {/* BOTTOM NAV */}
        <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:390,background:"#fff",borderTop:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-around",padding:"12px 8px 12px",zIndex:200,boxShadow:"0 -2px 20px rgba(45,74,66,0.1)"}}>

          <div onClick={()=>{setActiveTab("saved");setShowShopping(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",flex:1}}>
            <div style={{width:48,height:48,borderRadius:16,background:activeTab==="saved"&&!showShopping?"#2d4a42":C.green,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {activeTab==="saved"&&!showShopping
                ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#BFE8DC" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2d4a42" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
              }
            </div>
            <div style={{fontSize:11,fontWeight:activeTab==="saved"&&!showShopping?"bold":"normal",color:activeTab==="saved"&&!showShopping?"#2d4a42":C.textMuted,fontFamily:"Georgia,serif"}}>{L.tabRecipes}</div>
          </div>

          <div onClick={()=>setShowShopping(true)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",flex:1,position:"relative"}}>
            <div style={{width:48,height:48,borderRadius:16,background:showShopping?"#2d4a42":C.green,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={showShopping?"#BFE8DC":"#2d4a42"} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
              {shopping.length>0&&<span style={{position:"absolute",top:-3,right:-3,background:"#fa9f9d",color:"#fff",borderRadius:"50%",width:17,height:17,fontSize:10,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>{shopping.length}</span>}
            </div>
            <div style={{fontSize:11,fontWeight:showShopping?"bold":"normal",color:showShopping?"#2d4a42":C.textMuted,fontFamily:"Georgia,serif"}}>{L.tabShop}</div>
          </div>

          <div onClick={()=>{setActiveTab("tonight");setShowShopping(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",flex:1}}>
            <div style={{width:48,height:48,borderRadius:16,background:activeTab==="tonight"&&!showShopping?"#2d4a42":C.green,display:"flex",alignItems:"center",justifyContent:"center"}}>
              {activeTab==="tonight"&&!showShopping
                ? <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#BFE8DC" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="5" y1="10" x2="19" y2="10"/><line x1="8" y1="6" x2="8" y2="8"/><line x1="8" y1="14" x2="8" y2="18"/></svg>
                : <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2d4a42" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="5" y1="10" x2="19" y2="10"/><line x1="8" y1="6" x2="8" y2="8"/><line x1="8" y1="14" x2="8" y2="18"/></svg>
              }
            </div>
            <div style={{fontSize:11,fontWeight:activeTab==="tonight"&&!showShopping?"bold":"normal",color:activeTab==="tonight"&&!showShopping?"#2d4a42":C.textMuted,fontFamily:"Georgia,serif"}}>{L.tabFridge}</div>
          </div>

          <div onClick={()=>{setCookMode(false);setActiveTab("betty");setShowShopping(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer",flex:1}}>
            <div style={{width:48,height:48,borderRadius:16,background:C.green,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",border:`2.5px solid ${activeTab==="betty"&&!showShopping?"#2d4a42":C.green}`}}>
              <img src={BETTY_IMG} alt="Betty" style={{width:44,height:44,objectFit:"contain"}}/>
            </div>
            <div style={{fontSize:11,fontWeight:activeTab==="betty"&&!showShopping?"bold":"normal",color:activeTab==="betty"&&!showShopping?"#2d4a42":C.textMuted,fontFamily:"Georgia,serif"}}>{L.tabBetty}</div>
          </div>

        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<BettyApp/>);
</script>
</body>
</html>
